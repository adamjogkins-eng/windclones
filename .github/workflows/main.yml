name: Build WindClones
on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          xcodebuild clean build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Diagnostic File Check
        run: |
          echo "=== SEARCHING FOR APP BUNDLE ==="
          # This lists all directories ending in .app
          find . -name "*.app" -type d
          echo "=== CHECKING BUILD OUTPUT FOLDER ==="
          ls -R ./build_output | grep ":$" | sed -e 's/:$//' -e 's/[^-][^\/]*\//--/g' -e 's/^/   /'

      - name: Package IPA
        run: |
          mkdir -p Payload
          # The "Ultimate Find" command
          APP_PATH=$(find ./build_output -name "*.app" -type d | grep -v "Archive" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "FATAL ERROR: The Swift compiler failed. No .app folder exists."
            exit 1
          fi
          
          echo "Success! Found app at: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -r WindClones.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-Diagnostic-Result
          path: WindClones.ipa
