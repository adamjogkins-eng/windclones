name: Build WindClones
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force Swift Build
        run: |
          # 1. Build the binary for iPhone
          swift build -c release --triple arm64-apple-ios17.0-simulator
          
          # 2. Create the App Folder
          mkdir -p Payload/WindClones.app
          
          # 3. Find the file and move it
          # We look in the .build folder which is where forks store compiled data
          find .build -type f -name "WinClone" -exec cp {} Payload/WindClones.app/WindClones \;
          
          # 4. Create the Info.plist (The App's "ID Card")
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WindClones</string>
              <key>CFBundleIdentifier</key>
              <string>com.yourname.windclones</string>
              <key>CFBundleName</key>
              <string>WindClones</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
          </dict>
          </plist>' > Payload/WindClones.app/Info.plist
          
          # 5. Make it a real app and zip it
          chmod +x Payload/WindClones.app/WindClones
          zip -r WindClones.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-App
          path: WindClones.ipa
