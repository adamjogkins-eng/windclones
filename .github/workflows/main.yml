name: Build Memely
on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build Binary
        run: |
          xcodebuild build \
            -scheme "Memely" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO

      - name: Manual App Packaging
        run: |
          mkdir -p Payload/Memely.app
          BINARY_PATH=$(find ./build_output -name "Memely" -type f -perm +111 | head -n 1)
          cp "$BINARY_PATH" Payload/Memely.app/Memely
          cp Sources/Info.plist Payload/Memely.app/Info.plist
          zip -r Memely.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Memely-iOS18
          path: Memely.ipa
