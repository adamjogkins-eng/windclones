name: Build WinClone
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build App for iOS
        run: |
          # Use the specific Swift Package build command
          swift build -c release --triple arm64-apple-ios18.0-simulator
          
          # Create the App Bundle structure manually
          mkdir -p Payload/WinClone.app
          
          # Move the compiled binary into the bundle
          cp .build/arm64-apple-ios18.0-simulator/release/WinClone Payload/WinClone.app/WinClone
          
          # Create a basic Info.plist so iOS knows it's an app
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WinClone</string>
              <key>CFBundleIdentifier</key>
              <string>com.yourname.winclone</string>
              <key>CFBundleName</key>
              <string>WinClone</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
          </dict>
          </plist>' > Payload/WinClone.app/Info.plist

      - name: Create IPA
        run: |
          zip -r WinClone.ipa Payload

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: MyWindowsApp
          path: WinClone.ipa
