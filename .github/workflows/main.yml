name: Build WindClones
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Debug Output Structure
        run: ls -R ./build_output/Build/Products/

      - name: Package IPA
        run: |
          mkdir -p Payload
          # Search specifically in the Products folder where the binary lives
          APP_PATH=$(find ./build_output/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Searching fallback paths..."
            APP_PATH=$(find ./build_output -name "*.app" -type d | head -n 1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "FATAL ERROR: No .app folder found."
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -r WindClones.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-iOS18
          path: WindClones.ipa
