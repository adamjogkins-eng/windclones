name: Build WindClones
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          # This command forces the use of the iPhone SDK
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA Structure
        run: |
          mkdir -p Payload/WindClones.app
          
          # Find the compiled binary - it looks for the file 'WinClone'
          BINARY_PATH=$(find ./build_output -type f -name "WinClone" -not -path "*.framework*" | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            echo "Searching secondary location..."
            BINARY_PATH=$(find ./build_output -type f ! -name "*.*" -not -path "*/.*" | head -n 1)
          fi

          echo "Found binary at: $BINARY_PATH"
          cp "$BINARY_PATH" Payload/WindClones.app/WindClones
          
          # Create the Info.plist
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WindClones</string>
              <key>CFBundleIdentifier</key>
              <string>com.yourname.windclones</string>
              <key>CFBundleName</key>
              <string>WindClones</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
          </dict>
          </plist>' > Payload/WindClones.app/Info.plist
          
          chmod +x Payload/WindClones.app/WindClones
          zip -r WindClones.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-App
          path: WindClones.ipa
