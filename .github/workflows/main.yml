name: Build WindClones
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create ESign IPA
        run: |
          mkdir -p Payload/WindClones.app
          
          # 1. Search every corner for a file that is NOT 0 bytes
          # This looks for the largest file named 'WinClone' or 'WindClones'
          REAL_BINARY=$(find ./build_output -type f -size +10k ! -name "*.*" | head -n 1)

          if [ -z "$REAL_BINARY" ]; then
            echo "Searching system-wide..."
            REAL_BINARY=$(find ~/Library/Developer/Xcode/DerivedData -type f -size +10k ! -name "*.*" | head -n 1)
          fi

          if [ -z "$REAL_BINARY" ]; then
            echo "FATAL: No real binary found above 10KB."
            exit 1
          fi

          echo "Found real binary at: $REAL_BINARY"
          cp "$REAL_BINARY" Payload/WindClones.app/WindClones
          
          # 2. Re-create Info.plist
          cat <<EOF > Payload/WindClones.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WindClones</string>
              <key>CFBundleIdentifier</key>
              <string>com.win.clones</string>
              <key>CFBundleName</key>
              <string>WindClones</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
          </dict>
          </plist>
          EOF
          
          chmod +x Payload/WindClones.app/WindClones
          zip -r WindClones.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-Real-Binary
          path: WindClones.ipa
