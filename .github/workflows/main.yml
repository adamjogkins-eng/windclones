name: Build WindClones
on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build Binary
        run: |
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO

      - name: Manual App Packaging
        run: |
          mkdir -p Payload/WinClone.app
          BINARY_PATH=$(find ./build_output -name "WinClone" -type f -perm +111 | head -n 1)
          cp "$BINARY_PATH" Payload/WinClone.app/WinClone
          cp Sources/Info.plist Payload/WinClone.app/Info.plist
          zip -r WindClones.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-iOS18-Fixed
          path: WindClones.ipa
