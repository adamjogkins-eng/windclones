name: Build WinClone
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build App Binary
        run: |
          # 1. Compile the code for iPhone (arm64)
          # We tell it the name is WinClone based on our Package.swift
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA for ESign
        run: |
          # 2. Setup the folder structure ESign needs
          mkdir -p Payload
          
          # Find the compiled .app folder in the build output
          APP_PATH=$(find ./build_output -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: App folder not found!"
            exit 1
          fi
          
          cp -R "$APP_PATH" Payload/
          
          # 3. Zip it into an IPA file
          zip -r WinClone.ipa Payload

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: MyWindowsApp
          path: WinClone.ipa
