name: Build WindClones
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build Binary
        run: |
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO

      - name: Manual App Packaging
        run: |
          # 1. Create the .app folder structure
          mkdir -p Payload/WinClone.app
          
          # 2. Find the actual binary executable
          BINARY_PATH=$(find ./build_output -name "WinClone" -type f -perm +111 | head -n 1)
          echo "Found binary at: $BINARY_PATH"
          
          # 3. Copy binary and Info.plist into the app folder
          cp "$BINARY_PATH" Payload/WinClone.app/WinClone
          cp Sources/Info.plist Payload/WinClone.app/Info.plist
          
          # 4. Finalize IPA
          zip -r WindClones.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-iOS18-Fixed
          path: WindClones.ipa
