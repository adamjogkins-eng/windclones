name: Build WindClones
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch: # This adds a manual "Run" button

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          xcodebuild clean build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA Structure
        run: |
          mkdir -p Payload/WindClones.app
          
          # Find the app folder
          APP_PATH=$(find ./build_output -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then echo "No .app found"; exit 1; fi
          
          cp -R "$APP_PATH/" Payload/WindClones.app/
          
          # Force the Info.plist with all hardware keys
          cat <<EOF > Payload/WindClones.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WinClone</string>
              <key>CFBundleIdentifier</key>
              <string>com.win.clones</string>
              <key>CFBundleName</key>
              <string>WindClones</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>3.0</string>
              <key>NSCameraUsageDescription</key>
              <string>Used for OS Camera</string>
              <key>NSMicrophoneUsageDescription</key>
              <string>Used for OS Audio</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
          </dict>
          </plist>
          EOF
          
          zip -r WindClones.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-Full-OS
          path: WindClones.ipa
          if-no-files-found: error
