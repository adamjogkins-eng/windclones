name: Build WindClones
on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          # We use -derivedDataPath . to keep the files right here where we can see them
          xcodebuild clean build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Debug - List Files
        run: |
          echo "Listing all created .app folders:"
          find ./build_output -name "*.app" -type d

      - name: Package IPA
        run: |
          mkdir -p Payload
          
          # Find the actual .app folder
          APP_PATH=$(find ./build_output -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file was generated. The build likely failed higher up."
            exit 1
          fi
          
          echo "Found App at: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          
          # Use the actual name of the found app for the Info.plist
          APP_NAME=$(basename "$APP_PATH")
          
          cat <<EOF > "Payload/$APP_NAME/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WinClone</string>
              <key>CFBundleIdentifier</key>
              <string>com.win.clones</string>
              <key>CFBundleName</key>
              <string>WindClones</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>3.0</string>
              <key>NSCameraUsageDescription</key>
              <string>Hardware access for OS</string>
              <key>NSMicrophoneUsageDescription</key>
              <string>Hardware access for OS</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
          </dict>
          </plist>
          EOF
          
          zip -r WindClones.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-Built
          path: WindClones.ipa
