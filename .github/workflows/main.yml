name: Build WindClones
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Executable
        run: |
          # Force build as an executable for iOS
          swift build -c release --triple arm64-apple-ios17.0-simulator
          
          mkdir -p Payload/WindClones.app
          
          # Find the actual binary in the hidden .build folder
          REAL_BINARY=$(find .build -type f -name "WinClone" -not -path "*/.*" | head -n 1)
          
          if [ -z "$REAL_BINARY" ]; then
            echo "FATAL: Executable not found in .build folder."
            exit 1
          fi
          
          echo "Found binary at: $REAL_BINARY"
          cp "$REAL_BINARY" Payload/WindClones.app/WindClones
          
          # Create Info.plist
          cat <<EOF > Payload/WindClones.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WindClones</string>
              <key>CFBundleIdentifier</key>
              <string>com.win.clones</string>
              <key>CFBundleName</key>
              <string>WindClones</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
          </dict>
          </plist>
          EOF
          
          chmod +x Payload/WindClones.app/WindClones
          zip -r WindClones.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-Final-Try
          path: WindClones.ipa
