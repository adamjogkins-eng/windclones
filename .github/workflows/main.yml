name: Build WindClones
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          # This forces Xcode to use the real iOS SDK which contains the Standard Library
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA Structure
        run: |
          mkdir -p Payload/WindClones.app
          
          # Hunt for the compiled executable (should be several hundred KB now)
          REAL_BINARY=$(find ./build_output -type f -perm +111 ! -name "*.*" -size +50k | head -n 1)
          
          if [ -z "$REAL_BINARY" ]; then
            echo "Searching without size filter..."
            REAL_BINARY=$(find ./build_output -type f -perm +111 ! -name "*.*" | head -n 1)
          fi

          if [ -z "$REAL_BINARY" ]; then
            echo "FATAL: No binary found. Check if the build actually succeeded."
            exit 1
          fi

          echo "Found binary at: $REAL_BINARY"
          cp "$REAL_BINARY" Payload/WindClones.app/WindClones
          
          # Info.plist
          cat <<EOF > Payload/WindClones.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WindClones</string>
              <key>CFBundleIdentifier</key>
              <string>com.win.clones</string>
              <key>CFBundleName</key>
              <string>WindClones</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>CFBundleSupportedPlatforms</key>
              <array><string>iPhoneOS</string></array>
          </dict>
          </plist>
          EOF
          
          chmod +x Payload/WindClones.app/WindClones
          zip -r WindClones.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-Final
          path: WindClones.ipa
