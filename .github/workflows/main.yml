name: Build WinClone
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          # Use xcodebuild on the Package directly
          xcodebuild build \
            -scheme $(xcodebuild -list -json | jq -r '.project.schemes[0]') \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO

      - name: Debug - List Files
        run: find ./build_output -name "*.app" -o -type f ! -name "*.*"

      - name: Create IPA Structure
        run: |
          mkdir -p Payload/WinClone.app
          
          # Find any executable file in the build folder
          BINARY_PATH=$(find ./build_output/Build/Products/Release-iphoneos -type f -maxdepth 2 ! -name "*.*" | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
             # Backup search
             BINARY_PATH=$(find ./build_output -type f ! -name "*.*" -not -path "*/.*" | head -n 1)
          fi

          echo "Found binary at: $BINARY_PATH"
          cp "$BINARY_PATH" Payload/WinClone.app/WinClone
          
          # Basic Info.plist
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>WinClone</string><key>CFBundleIdentifier</key><string>com.clone.win</string><key>CFBundleName</key><string>WinClone</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>1.0</string><key>LSRequiresIPhoneOS</key><true/><key>MinimumOSVersion</key><string>17.0</string></dict></plist>' > Payload/WinClone.app/Info.plist
          
          chmod +x Payload/WinClone.app/WinClone
          zip -r WinClone.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MyWindowsApp
          path: WinClone.ipa
