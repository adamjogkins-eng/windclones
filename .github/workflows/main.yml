name: Build Windows Clone
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Swift Package
        run: swift package resolve

      - name: Build Unsigned IPA
        run: |
          # 1. Compile the app for iPhone hardware (arm64)
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 2. Create the IPA structure for ESign
          mkdir -p Payload
          # This finds the actual .app folder created by the build
          APP_PATH=$(find ./build_output -name "*.app" -type d | head -n 1)
          cp -R "$APP_PATH" Payload/
          
          # 3. Zip it up
          zip -r WindowsClone.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsClone-IPA
          path: WindowsClone.ipa
