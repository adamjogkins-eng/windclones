name: Build Offline Windows App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Fresh Project
        run: |
          # This command creates a brand new, clean project structure
          # ignoring all the old broken settings
          apple-swift-project-generator --name WindowsClone --output .
          
      - name: Build IPA
        run: |
          # Build using the two files we actually have
          xcodebuild build \
            -scheme "WindowsClone" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
          
          mkdir -p Payload
          cp -R build/Release-iphoneos/*.app Payload/
          zip -r WindowsClone.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MyUnsignedApp
          path: WindowsClone.ipa
