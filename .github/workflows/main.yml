name: Build WindClones
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15  # Use the latest macOS runner for Xcode 16+ support
    steps:
      - uses: actions/checkout@v4

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app # Ensures we use 16.0+

      - name: Build for iOS
        run: |
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ./build_output -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Build failed to produce .app bundle"
            exit 1
          fi
          cp -R "$APP_PATH" Payload/
          zip -r WindClones.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindClones-iOS18
          path: WindClones.ipa
