name: Build WinClone
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build App Binary
        run: |
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA for ESign
        run: |
          mkdir -p Payload
          # This 'find' command looks everywhere for the .app folder
          APP_PATH=$(find ./build_output -name "WinClone.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Searching secondary location..."
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WinClone.app" -type d | head -n 1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "Error: App folder still not found!"
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -r WinClone.ipa Payload

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: MyWindowsApp
          path: WinClone.ipa
