name: Build WinClone
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA Structure
        run: |
          mkdir -p Payload/WinClone.app
          
          # This command searches the build folder for the executable file named 'WinClone'
          BINARY_PATH=$(find ./build_output -type f -name "WinClone" -not -path "*.framework*" -not -path "*.xctest*" | head -n 1)
          
          if [ -z "$BINARY_PATH" ]; then
            echo "Error: Binary not found in build_output. Searching everything..."
            BINARY_PATH=$(find . -type f -name "WinClone" -not -path "./.git*" | head -n 1)
          fi

          if [ -z "$BINARY_PATH" ]; then
            echo "FATAL ERROR: Could not find the WinClone file anywhere."
            exit 1
          fi

          echo "Found binary at: $BINARY_PATH"
          cp "$BINARY_PATH" Payload/WinClone.app/WinClone
          
          # Create the Info.plist
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WinClone</string>
              <key>CFBundleIdentifier</key>
              <string>com.yourname.winclone</string>
              <key>CFBundleName</key>
              <string>WinClone</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
          </dict>
          </plist>' > Payload/WinClone.app/Info.plist
          
          chmod +x Payload/WinClone.app/WinClone
          zip -r WinClone.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MyWindowsApp
          path: WinClone.ipa
