name: Build WinClone
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build for iOS
        run: |
          # We force it to use the iPhoneOS SDK specifically
          xcodebuild build \
            -scheme "WinClone" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA Structure
        run: |
          mkdir -p Payload/WinClone.app
          
          # Find the compiled binary
          # In Swift Packages, it's often inside a .framework or a specific Build folder
          BINARY_PATH=$(find ./build_output -name "WinClone" -type f -maxdepth 4 | head -n 1)
          cp "$BINARY_PATH" Payload/WinClone.app/WinClone
          
          # Create the Info.plist (The App's Passport)
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>WinClone</string>
              <key>CFBundleIdentifier</key>
              <string>com.yourname.winclone</string>
              <key>CFBundleName</key>
              <string>WinClone</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
          </dict>
          </plist>' > Payload/WinClone.app/Info.plist
          
          chmod +x Payload/WinClone.app/WinClone
          zip -r WinClone.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MyWindowsApp
          path: WinClone.ipa
